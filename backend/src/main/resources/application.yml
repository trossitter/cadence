spring:
  application:
    name: cadence
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cadence}
    username: ${SPRING_DATASOURCE_USERNAME:cadence}
    password: ${SPRING_DATASOURCE_PASSWORD:cadence}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH0_ISSUER_URI:https://st6-dev.us.auth0.com/}

cadence:
  auth0:
    audience: ${AUTH0_AUDIENCE:https://api.cadence.local}
