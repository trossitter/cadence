services:
  postgres:
    image: postgres:16.4
    container_name: cadence-postgres
    environment:
      POSTGRES_DB: cadence
      POSTGRES_USER: cadence
      POSTGRES_PASSWORD: cadence
    ports:
      - "5432:5432"
    volumes:
      - cadence-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cadence -d cadence"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cadence-postgres-data:
